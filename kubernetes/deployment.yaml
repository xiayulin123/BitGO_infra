apiVersion: apps/v1
kind: Deployment
metadata:
  name: scalable-web-service
  labels:
    app: scalable-web-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scalable-web-service
  template:
    metadata:
      labels:
        app: scalable-web-service
    spec:
      containers:
        - name: app
          image: ghcr.io/therealdwright/scalable-web-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
